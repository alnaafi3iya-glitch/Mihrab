<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>محراب التثبيت — لوحة التنافس</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
  * { font-family: 'Tajawal', sans-serif; }

  body { background: #0d1f15; min-height: 100vh; }

  .gold { color: #f5c842; }
  .silver { color: #c0c0c0; }
  .bronze { color: #cd7f32; }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 8px #f5c84255; }
    50% { box-shadow: 0 0 22px #f5c84299; }
  }
  .first-place { animation: pulse-glow 2s ease-in-out infinite; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .row-anim { animation: slide-in 0.4s ease both; }

  .bar-fill { transition: width 1s cubic-bezier(.4,0,.2,1); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 1s linear infinite; }

  .gap-label {
    font-size: 10px;
    color: #6ee7b7;
    background: #064e3b44;
    border-radius: 6px;
    padding: 1px 7px;
    margin-right: 6px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="text-center pt-8 pb-4 px-4">
  <div class="text-3xl mb-1">🕌</div>
  <h1 class="text-2xl font-black text-emerald-300 tracking-wide">محراب التثبيت</h1>
  <p class="text-emerald-600 text-sm mt-1">لوحة التنافس الحية</p>
  <div id="week-label" class="mt-2 text-xs text-slate-500">جاري التحميل...</div>
</div>

<!-- Top 3 podium -->
<div id="podium" class="flex justify-center items-end gap-3 px-6 mt-2 mb-6 min-h-[120px]"></div>

<!-- Full leaderboard -->
<div class="px-4 max-w-lg mx-auto pb-24">
  <div id="board" class="space-y-3"></div>

  <!-- Empty state -->
  <div id="empty" class="hidden text-center text-slate-600 mt-16">
    <div class="text-4xl mb-3">📭</div>
    <p class="text-sm">لا توجد بيانات بعد<br/>ستظهر هنا فور بدء الطالبات</p>
  </div>

  <!-- Loading -->
  <div id="loading" class="flex justify-center mt-16">
    <div class="w-8 h-8 border-2 border-emerald-600 border-t-transparent rounded-full spinner"></div>
  </div>
</div>

<!-- Live indicator -->
<div class="fixed bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-emerald-900/80 backdrop-blur text-emerald-300 text-xs px-4 py-2 rounded-full shadow-lg">
  <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
  مباشر — يتحدث تلقائياً
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC828iIVZOZQRGqkt69cg85tB8VQLxR0p8",
    authDomain: "mihrab-leaderboard.firebaseapp.com",
    databaseURL: "https://mihrab-leaderboard-default-rtdb.firebaseio.com",
    projectId: "mihrab-leaderboard",
    storageBucket: "mihrab-leaderboard.firebasestorage.app",
    messagingSenderId: "791618163486",
    appId: "1:791618163486:web:4afe02716d3fd5b99d6f0f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const podiumEl = document.getElementById('podium');
  const boardEl  = document.getElementById('board');
  const emptyEl  = document.getElementById('empty');
  const loadEl   = document.getElementById('loading');
  const weekEl   = document.getElementById('week-label');

  // تنسيق الوقت
  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60)  return 'منذ لحظات';
    if (diff < 3600) return `منذ ${Math.floor(diff/60)} د`;
    if (diff < 86400) return `منذ ${Math.floor(diff/3600)} س`;
    return `منذ ${Math.floor(diff/86400)} يوم`;
  }

  // ألوان شريط التقدم حسب النسبة
  function barColor(pct) {
    if (pct >= 80) return '#10b981';
    if (pct >= 50) return '#f59e0b';
    return '#ef4444';
  }

  // رمز المركز
  function rankIcon(i) {
    if (i === 0) return '🥇';
    if (i === 1) return '🥈';
    if (i === 2) return '🥉';
    return `${i + 1}`;
  }

  // بناء منصة التتويج (أول 3)
  function renderPodium(sorted) {
    podiumEl.innerHTML = '';
    if (sorted.length === 0) return;

    const top3 = sorted.slice(0, Math.min(3, sorted.length));
    // ترتيب العرض: 2، 1، 3
    const displayOrder = top3.length === 1 ? [top3[0]]
                       : top3.length === 2 ? [top3[1], top3[0]]
                       : [top3[1], top3[0], top3[2]];

    const heights = ['h-16', 'h-24', 'h-12'];
    const colors  = ['bg-slate-600', 'bg-yellow-600', 'bg-amber-800'];
    const crowns  = ['🥈', '👑', '🥉'];

    displayOrder.forEach((s, idx) => {
      const isFirst = (s === top3[0]);
      const div = document.createElement('div');
      div.className = 'flex flex-col items-center gap-1';
      div.innerHTML = `
        <div class="text-lg">${crowns[idx]}</div>
        <div class="text-xs font-bold text-white truncate max-w-[70px] text-center">${s.name}</div>
        <div class="text-sm font-black ${isFirst ? 'text-yellow-400' : 'text-slate-300'}">${s.weekPct}%</div>
        <div class="${heights[idx]} w-16 ${colors[idx]} rounded-t-lg flex items-end justify-center pb-1 ${isFirst ? 'first-place' : ''}"></div>
      `;
      podiumEl.appendChild(div);
    });
  }

  // بناء القائمة الكاملة
  function renderBoard(sorted) {
    boardEl.innerHTML = '';
    if (sorted.length === 0) {
      emptyEl.classList.remove('hidden');
      return;
    }
    emptyEl.classList.add('hidden');

    // تحديد الأسبوع من أول بيانات
    const weeks = [...new Set(sorted.map(s => s.week).filter(Boolean))];
    if (weeks.length > 0) weekEl.textContent = `الأسبوع ${weeks[0]}`;

    sorted.forEach((s, i) => {
      const gapToAbove = i > 0 ? sorted[i-1].weekPct - s.weekPct : 0;
      const gapLabel = i > 0 && gapToAbove > 0
        ? `<span class="gap-label">↑ ${gapToAbove}% للمركز ${i}</span>`
        : '';

      const card = document.createElement('div');
      card.className = `row-anim bg-slate-800/70 rounded-2xl p-4 border ${i === 0 ? 'border-yellow-500/50' : 'border-slate-700/50'}`;
      card.style.animationDelay = `${i * 60}ms`;

      card.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <span class="text-xl w-8 text-center">${rankIcon(i)}</span>
            <div>
              <div class="font-bold text-white text-sm">${s.name}</div>
              <div class="text-[10px] text-slate-500">${timeAgo(s.lastUpdate)}</div>
            </div>
          </div>
          <div class="text-left">
            <div class="text-lg font-black ${i === 0 ? 'text-yellow-400' : 'text-emerald-400'}">${s.weekPct}%</div>
            ${gapLabel}
          </div>
        </div>

        <!-- شريط الإنجاز الكلي -->
        <div class="bg-slate-700 rounded-full h-2 overflow-hidden mb-1">
          <div class="bar-fill h-full rounded-full" style="width:${s.weekPct}%; background:${barColor(s.weekPct)};"></div>
        </div>

        <!-- تفاصيل المسارات -->
        <div class="flex gap-2 mt-2 text-[10px] text-slate-400">
          <span>متقن ${s.mutqanPct ?? '—'}%</span>
          <span>·</span>
          <span>متفلت ${s.mutfaletPct ?? '—'}%</span>
          <span>·</span>
          <span>جديد ${s.newPct ?? '—'}%</span>
        </div>
      `;
      boardEl.appendChild(card);
    });
  }

  // الاستماع للبيانات الحية
  const leaderRef = ref(db, 'leaderboard');
  onValue(leaderRef, (snapshot) => {
    loadEl.classList.add('hidden');
    const data = snapshot.val();

    if (!data) {
      emptyEl.classList.remove('hidden');
      podiumEl.innerHTML = '';
      boardEl.innerHTML  = '';
      return;
    }

    // تحويل إلى مصفوفة ورتّب
    const students = Object.values(data);
    students.sort((a, b) => (b.weekPct ?? 0) - (a.weekPct ?? 0));

    renderPodium(students);
    renderBoard(students);
  });
</script>
</body>
</html>
