
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محراب التثبيت — لوحة الشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #022c22, #064e3b, #0f172a);
            background-attachment: fixed;
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .podium-1 { background: linear-gradient(to top, #ca8a04, #fcd34d); box-shadow: 0 0 20px rgba(252, 211, 77, 0.4); }
        .podium-2 { background: linear-gradient(to top, #64748b, #cbd5e1); }
        .podium-3 { background: linear-gradient(to top, #78350f, #d97706); }
        .text-gold { background: linear-gradient(to right, #fcd34d, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-row { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .progress-bar-fill { transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .live-dot { animation: pulse-dot 1.5s infinite ease-in-out; }
        .hero-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
    
            filter: drop-shadow(0 8px 24px rgba(252, 211, 77, 0.35));
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="pb-24 antialiased">

    <!-- الرأس -->
    <header class="pt-8 pb-6 px-4 text-center relative overflow-hidden">
        <div class="absolute inset-0 flex justify-center items-center opacity-10 pointer-events-none">
            <div class="w-64 h-64 bg-emerald-500 rounded-full blur-[80px]"></div>
        </div>
        <div class="relative z-10 flex flex-col items-center">
            <img class="hero-img" src="https://alnaafi3iya-glitch.github.io/Mihrab/icon_nobg.png" alt="محراب التثبيت"/>
            <h1 class="text-3xl font-black text-gold tracking-wide mb-1">لوحة الشرف والمنافسة</h1>
            <p class="text-emerald-200/80 text-sm font-bold">محراب التثبيت — <span id="week-label">جاري التحميل...</span></p>
        </div>
    </header>

    <!-- منصة التتويج -->
    <div id="podium-container" class="flex justify-center items-end gap-2 px-4 mt-4 mb-10 h-44"></div>

    <!-- قائمة المتنافسين -->
    <main class="px-4 max-w-2xl mx-auto space-y-4" id="board-container">
        <div id="loading-state" class="flex flex-col items-center justify-center py-10 opacity-70">
            <div class="w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-3"></div>
            <p class="text-sm font-bold">جاري جلب بيانات المتنافسين...</p>
        </div>
        <div id="empty-state" class="hidden text-center py-12 glass-card rounded-3xl">
            <div class="text-5xl mb-4">📜</div>
            <h3 class="text-xl font-bold text-emerald-100">لا توجد بيانات لهذا الأسبوع</h3>
            <p class="text-sm text-emerald-200/60 mt-2">ستظهر الأسماء هنا فور بدء إنجاز الورد.</p>
        </div>
    </main>

    <!-- مؤشر البث الحي -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 glass-card rounded-full px-5 py-2.5 flex items-center gap-2 shadow-2xl z-50">
        <div class="w-2.5 h-2.5 bg-rose-500 rounded-full live-dot shadow-[0_0_8px_#f43f5e]"></div>
        <span class="text-xs font-bold text-emerald-100 tracking-wider">تحديث مباشر</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC828iIVZOZQRGqkt69cg85tB8VQLxR0p8",
            authDomain: "mihrab-leaderboard.firebaseapp.com",
            databaseURL: "https://mihrab-leaderboard-default-rtdb.firebaseio.com",
            projectId: "mihrab-leaderboard",
            storageBucket: "mihrab-leaderboard.firebasestorage.app",
            messagingSenderId: "791618163486",
            appId: "1:791618163486:web:4afe02716d3fd5b99d6f0f"
        };

        initializeApp(firebaseConfig);
        const db = getDatabase();

        const podiumEl  = document.getElementById('podium-container');
        const boardEl   = document.getElementById('board-container');
        const loadingEl = document.getElementById('loading-state');
        const emptyEl   = document.getElementById('empty-state');
        const weekEl    = document.getElementById('week-label');

        function timeAgo(ts) {
            if (!ts) return 'غير محدد';
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60)    return 'الآن';
            if (diff < 3600)  return `منذ ${Math.floor(diff/60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
            return `منذ ${Math.floor(diff/86400)} يوم`;
        }

        function getColorByPct(pct) {
            if (pct >= 90) return 'from-emerald-400 to-emerald-600';
            if (pct >= 50) return 'from-amber-400 to-amber-600';
            return 'from-rose-400 to-rose-600';
        }

        function buildPodiumItem(student, rank) {
            const heights = { 1: 'h-32', 2: 'h-24', 3: 'h-16' };
            const crowns  = { 1: '👑',   2: '🥈',   3: '🥉'   };
            const isFirst = rank === 1;
            return `
                <div class="flex flex-col items-center justify-end w-24 animate-row" style="animation-delay:${rank*100}ms">
                    <div class="text-2xl mb-1 drop-shadow-md ${isFirst ? 'animate-bounce' : ''}">${crowns[rank]}</div>
                    <div class="text-xs font-bold text-center truncate w-full mb-1 drop-shadow ${isFirst ? 'text-gold text-sm' : 'text-slate-200'}">${student.name}</div>
                    <div class="text-[10px] font-black bg-black/40 px-2 py-0.5 rounded-full mb-2">${student.weekPct ?? 0}%</div>
                    <div class="w-full ${heights[rank]} podium-${rank} rounded-t-xl relative overflow-hidden">
                        <div class="absolute inset-0 bg-white/20 opacity-0 hover:opacity-100 transition duration-300"></div>
                    </div>
                </div>
            `;
        }

        function buildBoardRow(student, index) {
            const displayRank = index + 1;
            const rankBadge = `<div class="w-8 h-8 rounded-full bg-slate-800/80 border border-slate-600 flex items-center justify-center font-bold text-slate-300 text-sm shadow-inner">${displayRank}</div>`;
            return `
                <div class="glass-card rounded-2xl p-4 animate-row relative overflow-hidden group" style="animation-delay:${(index+3)*60}ms">
                    <div class="absolute top-0 right-0 w-1 h-full bg-gradient-to-b ${getColorByPct(student.weekPct??0)} opacity-50 group-hover:opacity-100 transition"></div>
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">
                            ${rankBadge}
                            <div>
                                <h3 class="font-bold text-emerald-50 text-sm md:text-base">${student.name}</h3>
                                <p class="text-[10px] text-emerald-200/50 flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500/50"></span>
                                    آخر تحديث: ${timeAgo(student.lastUpdate)}
                                </p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-br ${getColorByPct(student.weekPct??0)}">${student.weekPct ?? 0}%</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-900/60 rounded-full h-2.5 mb-3 shadow-inner overflow-hidden border border-white/5">
                        <div class="h-full rounded-full bg-gradient-to-l ${getColorByPct(student.weekPct??0)} progress-bar-fill" style="width:${student.weekPct??0}%"></div>
                    </div>
                    <div class="flex gap-2 text-[10px] md:text-xs">
                        <div class="flex-1 bg-white/5 rounded-lg py-1.5 px-2 text-center border border-white/5">
                            <span class="block text-emerald-400 font-bold mb-0.5">${student.mutqanPct ?? 0}%</span>
                            <span class="text-slate-400">متقن 📘</span>
                        </div>
                        <div class="flex-1 bg-white/5 rounded-lg py-1.5 px-2 text-center border border-white/5">
                            <span class="block text-teal-400 font-bold mb-0.5">${student.mutfaletPct ?? 0}%</span>
                            <span class="text-slate-400">متفلت 📗</span>
                        </div>
                        ${student.newPct !== null && student.newPct !== undefined ? `
                        <div class="flex-1 bg-white/5 rounded-lg py-1.5 px-2 text-center border border-white/5">
                            <span class="block text-amber-400 font-bold mb-0.5">${student.newPct}%</span>
                            <span class="text-slate-400">جديد 📒</span>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }

        onValue(ref(db, 'leaderboard'), (snapshot) => {
            if (loadingEl) loadingEl.remove();
            podiumEl.innerHTML = '';
            boardEl.innerHTML  = '';

            const data = snapshot.val();
            if (!data) {
                emptyEl.classList.remove('hidden');
                weekEl.textContent = 'لا توجد بيانات';
                return;
            }

            const students = Object.values(data);
            students.sort((a, b) => (b.weekPct ?? 0) - (a.weekPct ?? 0));

            const now = new Date();
            const dayOfWeek = now.getDay(); // 0=أحد، 1=اثنين
            const diffToMon = (dayOfWeek === 0) ? 6 : dayOfWeek - 1;
            const monStart = new Date(now);
            monStart.setDate(now.getDate() - diffToMon);
            const sunEnd = new Date(monStart);
            sunEnd.setDate(monStart.getDate() + 6);
            const fmt = d => `${d.getDate()} ${['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'][d.getMonth()]}`;
            weekEl.textContent = `${fmt(monStart)} — ${fmt(sunEnd)} ${sunEnd.getFullYear()}`;
            // المنصة: ترتيب 2، 1، 3
            const top3 = students.slice(0, 3);
            let podiumHTML = '';
            if (top3[1]) podiumHTML += buildPodiumItem(top3[1], 2);
            if (top3[0]) podiumHTML += buildPodiumItem(top3[0], 1);
            if (top3[2]) podiumHTML += buildPodiumItem(top3[2], 3);
            podiumEl.innerHTML = podiumHTML;

            // القائمة الكاملة
            students.forEach((student, index) => {
                boardEl.innerHTML += buildBoardRow(student, index);
            });
        });
    </script>
</body>
</html>
