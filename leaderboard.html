
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حلبة المنافسة التفاعلية - محراب</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.3s, color 0.3s;
        }
        /* دعم الوضع الليلي ليتطابق مع تطبيق محراب للطالبة */
        .dark body {
            background-color: #0f172a;
        }
        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-200 antialiased min-h-screen pb-12">

    <div class="w-full max-w-xl mx-auto px-4 pt-6">
        
        <!-- ترويسة الحلبة الذكية -->
        <div class="bg-gradient-to-l from-emerald-900 to-emerald-700 rounded-3xl p-6 text-white text-center shadow-xl mb-6 relative overflow-hidden animate-pop">
            <div class="text-4xl mb-3">🏆</div>
            <h1 class="text-2xl font-black mb-1">حلبة المنافسة والتميز</h1>
            <p class="text-xs text-emerald-200" id="group-title-label">جاري تحميل بيانات حلقتكِ المميزة...</p>
            
            <!-- معلومات المعلمة المرافقة -->
            <div id="teacher-badge" class="hidden mt-3 inline-flex items-center gap-2 bg-white/10 px-4 py-1.5 rounded-full text-xs font-bold border border-white/10">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>المعلمة المشرفة: أ. <span id="teacher-name-label">--</span></span>
            </div>
        </div>

        <!-- فلتر العرض النشط -->
        <div id="filter-banner" class="hidden bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900/50 rounded-2xl p-4 mb-6 text-amber-800 dark:text-amber-300 flex items-center gap-3 text-xs leading-relaxed">
            <i class="fa-solid fa-circle-info text-amber-500 text-lg"></i>
            <div>
                تم تصفية اللوحة تلقائياً لعرض طالبات حلقة <strong id="filter-group-name">--</strong> فقط.
            </div>
        </div>

        <!-- جدول الترتيب والمتصدرين -->
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 shadow-sm animate-pop">
            <h3 class="font-black text-slate-800 dark:text-slate-100 text-sm mb-4 flex items-center justify-between">
                <span><i class="fa-solid fa-list-ol text-emerald-600 ml-1.5"></i> ترتيب المتميزات حسب إنجاز الأسبوع</span>
                <span id="total-count-label" class="text-xs bg-emerald-50 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300 px-2.5 py-1 rounded-full font-bold">0 طالبات</span>
            </h3>
            
            <!-- قائمة الطالبات التفاعلية -->
            <div id="leaderboard-list" class="space-y-3">
                <!-- جاري تحميل البيانات... -->
                <div class="text-center py-8 text-slate-400 dark:text-slate-500">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-emerald-600"></i>
                    <p class="text-xs font-bold">جاري تحميل لوحة المتصدرين من السحابة...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === إعدادات Firebase لضمان الاتصال المتطابق ===
        firebase.initializeApp({
            apiKey: "AIzaSyC828iIVZOZQRGqkt69cg85tB8VQLxR0p8",
            authDomain: "mihrab-leaderboard.firebaseapp.com",
            databaseURL: "https://mihrab-leaderboard-default-rtdb.firebaseio.com",
            projectId: "mihrab-leaderboard",
            storageBucket: "mihrab-leaderboard.firebasestorage.app",
            messagingSenderId: "791618163486",
            appId: "1:791618163486:web:4afe02716d3fd5b99d6f0f"
        });
        const db = firebase.database();

        // تفعيل الوضع الداكن بناءً على اختيار الطالبة في التطبيق الرئيسي
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        // === 1. جلب اسم الطالبة الحالية المسجلة في هذا الهاتف ===
        let currentStudentName = "";
        try {
            const savedData = localStorage.getItem('qp_current_program_v6') || localStorage.getItem('qp_current_program_v5') || localStorage.getItem('qp_current_program_v4');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                currentStudentName = parsed.S?.programName || parsed.PROG?.name || "";
            }
        } catch (e) {
            console.error("Error reading student name from localstorage:", e);
        }

        // تطهير اسم الطالبة لمطابقة مفاتيح الفايربيس
        const studentKey = currentStudentName ? currentStudentName.replace(/[.#$[\]]/g, '_') : "";

        // === 2. جلب البيانات من السحابة والمزامنة اللحظية ===
        Promise.all([
            db.ref('leaderboard').once('value'),
            db.ref('dashboard_data/student_groups').once('value'),
            db.ref('dashboard_data/groups').once('value')
        ]).then(([snapLeaderboard, snapStudentGroups, snapGroups]) => {
            const leaderboardData = snapLeaderboard.val() || {};
            const studentGroupsMap = snapStudentGroups.val() || {};
            const groupsData = snapGroups.val() || {};

            renderLeaderboard(leaderboardData, studentGroupsMap, groupsData);
        }).catch(err => {
            console.error("Firebase fetch error:", err);
            document.getElementById('leaderboard-list').innerHTML = `
                <div class="text-center py-8 text-rose-500">
                    <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                    <p class="text-xs font-bold">عذراً، تعذر تحميل البيانات بسبب جدار الأمان. يرجى مراجعة الإدارة.</p>
                </div>`;
        });

        function renderLeaderboard(leaderboard, studentGroups, groups) {
            const listContainer = document.getElementById('leaderboard-list');
            listContainer.innerHTML = "";

            // تحديد رقم مجموعة الطالبة الحالية (إن وجد)
            const myGroupId = studentGroups[studentKey] || null;
            const myGroupInfo = myGroupId ? groups[myGroupId] : null;

            // تحديث الترويسة وشريط الفلتر
            if (myGroupInfo) {
                document.getElementById('group-title-label').innerText = `حلقة ${myGroupInfo.name}`;
                document.getElementById('teacher-name-label').innerText = myGroupInfo.teacher || "غير متاح";
                document.getElementById('teacher-badge').classList.remove('hidden');
                
                document.getElementById('filter-group-name').innerText = `"${myGroupInfo.name}"`;
                document.getElementById('filter-banner').classList.remove('hidden');
            } else {
                document.getElementById('group-title-label').innerText = "حلبة المنافسة العامة لجميع المشتركات";
                document.getElementById('teacher-badge').classList.add('hidden');
                document.getElementById('filter-banner').classList.add('hidden');
            }

            // تجميع وتصفية الطالبات
            let studentsList = [];
            for (let key in leaderboard) {
                const s = leaderboard[key];
                if (!s || typeof s !== 'object') continue;

                const gId = studentGroups[key] || null;

                // إذا كانت الطالبة تنتمي لمجموعة، اعرضي فقط من يشاركنها نفس المجموعة
                if (myGroupId && gId !== myGroupId) continue;

                studentsList.push({ key, ...s });
            }

            // ترتيب تنازلياً حسب نسبة إنجاز الأسبوع الحالي
            studentsList.sort((a, b) => (b.weekPct || 0) - (a.weekPct || 0));

            document.getElementById('total-count-label').innerText = `${studentsList.length} طالبات`;

            if (studentsList.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-8 text-slate-400 dark:text-slate-500 font-bold text-xs">لا توجد طالبات في هذه المجموعة حالياً</div>`;
                return;
            }

            // رسم قائمة المتصدرين بشكل أنيق ومميز مع أوسمة للمراكز الأولى
            studentsList.forEach((s, index) => {
                const rank = index + 1;
                let rankBadge = "";
                
                if (rank === 1) rankBadge = "🥇";
                else if (rank === 2) rankBadge = "🥈";
                else if (rank === 3) rankBadge = "🥉";
                else rankBadge = `<span class="text-[11px] font-bold text-slate-400 bg-slate-100 dark:bg-slate-700/50 w-6 h-6 rounded-full flex items-center justify-center">${rank}</span>`;

                const isMe = (s.key === studentKey);
                const bgClass = isMe 
                    ? "bg-emerald-50 dark:bg-emerald-950/20 border-emerald-400 dark:border-emerald-800" 
                    : "bg-slate-50 dark:bg-slate-900/40 border-slate-100 dark:border-slate-800";

                listContainer.innerHTML += `
                    <div class="flex items-center justify-between p-3.5 rounded-2xl border ${bgClass} transition">
                        <div class="flex items-center gap-3">
                            <div class="flex-shrink-0 w-8 flex items-center justify-center">${rankBadge}</div>
                            <div>
                                <h4 class="font-bold text-sm text-slate-800 dark:text-slate-100 flex items-center gap-1.5">
                                    <span>${s.name || 'طالبة'}</span>
                                    ${isMe ? '<span class="text-[8px] bg-emerald-600 text-white font-bold py-0.5 px-1.5 rounded-full">أنا ✨</span>' : ''}
                                </h4>
                                <p class="text-[10px] text-slate-400 dark:text-slate-500 font-bold mt-0.5">
                                    أسبوع البرنامج الحالي: ${s.week || 1}
                                </p>
                            </div>
                        </div>
                        
                        <!-- إحصائيات الإنجاز الدائرية الفخمة للبنت -->
                        <div class="flex items-center gap-4 text-left">
                            <div class="text-right">
                                <span class="block text-[10px] text-slate-400 font-bold">إنجاز الأسبوع</span>
                                <span class="text-xs font-black text-emerald-600 dark:text-emerald-400">${s.weekPct || 0}%</span>
                            </div>
                            
                            <!-- شريط إنجاز بصري مصغر -->
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                                <div class="bg-emerald-500 h-full" style="width: ${s.weekPct || 0}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
