        const _storage = (() => {
            const mem = {};
            try { localStorage.setItem('__t', '1'); localStorage.removeItem('__t'); }
            catch(e) { return { getItem: k => mem[k]??null, setItem: (k,v) => {mem[k]=v;}, removeItem: k => {delete mem[k];} }; }
            return localStorage;
        })();

        function loadSavedState() {
            let saved = _storage.getItem('qp_current_program_v6') || _storage.getItem('qp_current_program_v5') || _storage.getItem('qp_current_program_v4');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    S = { ...DEFAULT_S, ...(parsed.S || {}) };
                    PROG = { ...DEFAULT_PROG, ...(parsed.PROG || {}) };
                    TRACKING = parsed.TRACKING || {};
                    PROGRAM_START_DATE = parsed.startDate ? new Date(parsed.startDate) : null;
                    // إصلاح تلقائي: مسار المبتدئ دورته الأسبوعية ثابتة دوماً = 7 أيام (6 نشطة + يوم استدراك).
                    let needsResave = false;
                    if (S.isBeginnerMode && S.mutqanDays !== 7) { S.mutqanDays = 7; needsResave = true; }
                    if (S.programName && S.step > 0 && S.step !== 98) S.step = 99; 
                    if (needsResave) saveState();
                } catch (e) {}
            }
        }

        function saveState() {
            const data = { S, PROG, TRACKING, startDate: PROGRAM_START_DATE ? PROGRAM_START_DATE.toISOString() : null };
            _storage.setItem('qp_current_program_v6', JSON.stringify(data));
            if (S.programName && S.step > 0) {
                let progs = JSON.parse(_storage.getItem('qp_programs_list_v6') || '[]');
                const idx = progs.findIndex(p => p.name === S.programName);
                if (idx >= 0) progs[idx].data = data; else progs.push({ name: S.programName, data: data });
                _storage.setItem('qp_programs_list_v6', JSON.stringify(progs));
            }
        }

        function deleteProgram(name) {
            let progs = JSON.parse(_storage.getItem('qp_programs_list_v6') || '[]').filter(p => p.name !== name);
            _storage.setItem('qp_programs_list_v6', JSON.stringify(progs));
            if (S.programName === name) resetToDefault(); else render(); 
        }

        function resetToDefault() {
            S = { ...DEFAULT_S }; PROG = { ...DEFAULT_PROG }; TRACKING = {}; PROGRAM_START_DATE = null;
            _storage.removeItem('qp_current_program_v6'); saveState(); render();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

            const data = { S, PROG, TRACKING, startDate: PROGRAM_START_DATE ? PROGRAM_START_DATE.toISOString() : null, version: "6.0" };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
            const downloadNode = document.createElement('a');
            downloadNode.setAttribute("href", dataStr);
            downloadNode.setAttribute("download", `برنامج_${escapeHTML(S.programName || 'حفظ')}.json`);
            document.body.appendChild(downloadNode); 
            downloadNode.click(); downloadNode.remove();
        }

        function importDataFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.S) {
                        if (parsed.S.unit && !parsed.S.newDailyUnit) {
                            S.isBeginnerMode = true; S.hasNew = true;
                            S.programName = parsed.S.programName || "برنامج مستورد";
                            S.riwaya = parsed.S.riwaya || "حفص عن عاصم";
                            S.newDailyUnit = parsed.S.unit === "نصف صفحة" ? "نصف صفحة" : parsed.S.unit === "صفحة" ? "صفحة" : parsed.S.unit === "ربع" ? "ربع" : "صفحة";
                            S.newDays = parsed.S.memDays || [];
                            S.weekStartDay = parsed.S.weekStartDay || "الأحد";
                            S.newStartUnit = parsed.S.startType || "suwar";
                            S.newStartFrom = parsed.S.startFrom || "الفاتحة";
                            PROGRAM_START_DATE = parsed.S.startDate ? new Date(parsed.S.startDate) : new Date();
                            S.mutqanDays = 7;
                        } else {
                            S = { ...DEFAULT_S, ...(parsed.S || {}) };
                            PROGRAM_START_DATE = parsed.startDate ? new Date(parsed.startDate) : null;
                        }
                        PROG = { ...DEFAULT_PROG, ...(parsed.PROG || {}) };
                        TRACKING = parsed.TRACKING || {};
                        S.step = 99;
                        saveState(); render();
                        alert("تم استيراد البرنامج بنجاح!");
                    } else { alert("ملف غير صالح."); }
                } catch (err) { alert("حدث خطأ أثناء قراءة الملف، تأكد أنه ملف إعدادات صالح."); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // ==========================================
        // نظام التوجيه المنطقي الدقيق للأسئلة (Wizard Router)
        // ==========================================
        function getNextStep(c) {
            if (S.isBeginnerMode) {
                if (c === 1) return 9;
                if (c >= 9 && c < 12) return c + 1;
            } else {
                if (c < 8) return c + 1;
                if (c === 8) return S.hasNew ? 9 : 12;
                if (c >= 9 && c < 12) return c + 1;
            }
            return 99;
        }

        function getPrevStep(c) {
            if (S.isBeginnerMode) {
                if (c === 9) return 1;
                if (c > 9 && c <= 12) return c - 1;
            } else {
                if (c > 1 && c <= 8) return c - 1;
                if (c === 9) return 8;
                if (c === 12) return S.hasNew ? 11 : 8;
                if (c > 9 && c < 12) return c - 1;
            }
            return 1;
        }

        function goPrev() {
            if (S.isEditing) { S.isEditing = false; S.step = 98; } 
            else { S.step = getPrevStep(S.step); }
            saveState(); render();
        }

        function goNext() {
            if (S.isEditing) {
                if (S.step === 8 && S.hasNew && S.newDays.length === 0) { S.step = 9; }
                else if (S.step === 9 && S.newDays.length === 0) { S.step = 10; }
                else { S.step = 98; S.isEditing = false; }
            } else {
                S.step = getNextStep(S.step);
            }
            saveState(); render();
        }

        function renderNavButtons(container, isNextEnabled) {
            const wrapper = document.createElement("div"); wrapper.className = "flex gap-2 mt-6";
            if (!S.isEditing && S.step > 1) {
                const prevBtn = document.createElement("button");
                prevBtn.className = "flex-1 py-3 border border-slate-200 text-slate-600 font-bold rounded-xl text-sm hover:bg-slate-50 transition";
                prevBtn.textContent = "رجوع"; prevBtn.onclick = goPrev; wrapper.appendChild(prevBtn);
            }
            const nextBtn = document.createElement("button");
            nextBtn.className = `flex-1 py-3 font-bold rounded-xl text-sm shadow transition ${isNextEnabled ? (S.isEditing ? 'bg-amber-600 text-white hover:bg-amber-700' : 'bg-emerald-700 text-white hover:bg-emerald-800') : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`;
            nextBtn.textContent = S.isEditing ? "حفظ ومتابعة التعديل ✓" : "متابعة ←";
            nextBtn.disabled = !isNextEnabled;
            nextBtn.onclick = goNext;
            wrapper.appendChild(nextBtn); container.appendChild(wrapper);
        }

        // ==========================================
        // المحرك الهيكلي الذكي للوحدات
        // ==========================================
        function inputToStartPage(unit, from) {
            if (unit === "suwar") return SURAHS.indexOf(from) >= 0 ? SURAH_PAGE[SURAHS.indexOf(from)] : null;
            if (unit === "ajzaa") return JUZ_PAGE[(parseInt(from)||1)-1] || 1;
            if (unit === "ahzab") return Math.round(((parseInt(from)||1)-1) * 10.07) + 1;
            if (unit === "pages") return parseInt(from) || 1;
            return null;
        }

        function inputToPages(unit, from, to, fq = 1, tq = 4) {
            if (unit === "suwar") {
                const fi = SURAHS.indexOf(from), ti = SURAHS.indexOf(to);
                if (fi < 0 || ti < 0) return null;
                return { start: SURAH_PAGE[fi], end: ti < 113 ? SURAH_PAGE[ti+1] - 1 : 604 };
            }
            if (unit === "ajzaa") return { start: JUZ_PAGE[(parseInt(from)||1)-1] || 1, end: (parseInt(to)||1) < 30 ? JUZ_PAGE[parseInt(to)||1] - 1 : 604 };
            if (unit === "ahzab") {
                const f = parseInt(from)||1, t = parseInt(to)||1;
                const fromQ = parseInt(fq || 1), toQ = parseInt(tq || 4);
                return { start: Math.round((f-1)*(604/60) + (fromQ-1)*(604/240)) + 1, end: Math.min(604, Math.round((t-1)*(604/60) + toQ*(604/240))) };
            }
            return null;
        }

        function getStartingAbsIndex(sourceUnit, fromValue, targetUnit, fromQuarter = 1) {
            let uPerHizb = UNITS_PER_HIZB[targetUnit] || 1;
            if (sourceUnit === "ajzaa") return ((parseInt(fromValue)||1) - 1) * (uPerHizb * 2);
            if (sourceUnit === "ahzab") {
                let hizbIndex = (parseInt(fromValue)||1) - 1;
                let qIndex = (parseInt(fromQuarter)||1) - 1;
                return Math.floor(hizbIndex * uPerHizb + qIndex * (uPerHizb / 4));
            }
            let startPage = inputToStartPage(sourceUnit, fromValue) || 1;
            let pagesPerUnit = 604 / (60 * uPerHizb);
            if (targetUnit === "صفحة") pagesPerUnit = 1;
            if (targetUnit === "نصف صفحة") pagesPerUnit = 0.5;
            return Math.floor((startPage - 1) / pagesPerUnit);
        }

        function formatDiscreteUnit(index, unitName) {
            if (unitName === "ربع") return `ربع ${(index % 4) + 1} ح${Math.floor(index / 4) + 1}`;
            if (unitName === "ثمن") return `ثمن ${(index % 8) + 1} ح${Math.floor(index / 8) + 1}`;
            if (unitName === "نصف ثمن") return `نصف ثمن ${(index % 16) + 1} ح${Math.floor(index / 16) + 1}`;
            if (unitName === "حزب") return `الحزب ${index + 1}`;
            if (unitName === "جزء") return `الجزء ${Math.floor(index/2) + 1}`;
            if (unitName === "صفحة") return `ص ${index + 1}`;
            if (unitName === "نصف صفحة") return `ص ${Math.floor(index/2) + 1} ${index%2!==0?'(نصف 2)':'(نصف 1)'}`;
            return `${unitName} ${index + 1}`;
        }

        function formatDiscreteRange(startIndex, endIndex, unitName) {
            if (startIndex > endIndex) return "—";
            if (startIndex === endIndex) return formatDiscreteUnit(startIndex, unitName);

            if (unitName === "نصف صفحة") {
                let sPage = Math.floor(startIndex / 2) + 1;
                let sHalf = (startIndex % 2 === 0) ? 1 : 2;
                let ePage = Math.floor(endIndex / 2) + 1;
                let eHalf = (endIndex % 2 === 0) ? 1 : 2;

                let sText = (sHalf === 1) ? `ص ${sPage}` : `ص ${sPage} (نصف 2)`;
                let eText = (eHalf === 2) ? `ص ${ePage}` : `ص ${ePage} (نصف 1)`;
                
                if (sHalf === 1 && eHalf === 2) {
                    if (sPage === ePage) return `ص ${sPage}`;
                    return `من ص ${sPage} إلى ص ${ePage}`;
                }
                return `من ${sText} إلى ${eText}`;
            }

            if (unitName === "نصف ثمن") {
                let sThumnIdx = Math.floor(startIndex / 2), eThumnIdx = Math.floor(endIndex / 2);
                let sRubIdx = Math.floor(startIndex / 4), eRubIdx = Math.floor(endIndex / 4);
                let sHizbIdx = Math.floor(startIndex / 16), eHizbIdx = Math.floor(endIndex / 16);

                if (startIndex % 16 === 0 && endIndex % 16 === 15 && sHizbIdx === eHizbIdx) return `الحزب ${sHizbIdx + 1} كاملاً`;
                if (startIndex % 4 === 0 && endIndex % 4 === 3 && sRubIdx === eRubIdx) return formatDiscreteUnit(sRubIdx, "ربع") + " كاملاً";
                if (startIndex % 2 === 0 && endIndex % 2 === 1 && sThumnIdx === eThumnIdx) return formatDiscreteUnit(sThumnIdx, "ثمن") + " كاملاً";

                let sText = formatDiscreteUnit(startIndex, "نصف ثمن");
                let eText = formatDiscreteUnit(endIndex, "نصف ثمن");

                return `من ${sText} إلى ${eText}`;
            }

            if (unitName === "ثمن") {
                let sRubIdx = Math.floor(startIndex / 2), eRubIdx = Math.floor(endIndex / 2);
                let sHizbIdx = Math.floor(startIndex / 8), eHizbIdx = Math.floor(endIndex / 8);

                if (startIndex % 8 === 0 && endIndex % 8 === 7 && sHizbIdx === eHizbIdx) return `الحزب ${sHizbIdx + 1} كاملاً`;
                if (startIndex % 2 === 0 && endIndex % 2 === 1 && sRubIdx === eRubIdx) return formatDiscreteUnit(sRubIdx, "ربع") + " كاملاً";

                let sText = formatDiscreteUnit(startIndex, "ثمن");
                let eText = formatDiscreteUnit(endIndex, "ثمن");

                return `من ${sText} إلى ${eText}`;
            }

            if (unitName === "ربع") {
                let sHizbIdx = Math.floor(startIndex / 4), eHizbIdx = Math.floor(endIndex / 4);
                if (startIndex % 4 === 0 && endIndex % 4 === 3 && sHizbIdx === eHizbIdx) return `الحزب ${sHizbIdx + 1} كاملاً`;
                
                let sText = formatDiscreteUnit(startIndex, "ربع");
                let eText = formatDiscreteUnit(endIndex, "ربع");

                return `من ${sText} إلى ${eText}`;
            }
            
            if (unitName === "صفحة") {
                return `من ص ${startIndex + 1} إلى ص ${endIndex + 1}`;
            }

            return `من ${formatDiscreteUnit(startIndex, unitName)} إلى ${formatDiscreteUnit(endIndex, unitName)}`;
        }

        function distributeMutqan(mStart, mEnd, activeDays, reviewUnit) {
            const totalPagesRaw = mEnd - mStart + 1; 
            if (totalPagesRaw <= 0) return Array(activeDays).fill({ label: "—", start: null, end: null });

            if (reviewUnit === "بالصفحات") {
                const ppd = totalPagesRaw / activeDays;
                const schedule = [];
                for (let i = 0; i < activeDays; i++) {
                    const s = Math.round(mStart + i * ppd);
                    const e = Math.min(mEnd, Math.round(mStart + (i + 1) * ppd) - 1);
                    schedule.push({ label: s===e?`ص ${s}`:`ص ${s}–${e}`, start: s, end: e });
                }
                return schedule;
            }

            let list = [];
            if (reviewUnit === "بالسور") {
                for (let i = 0; i < SURAHS.length; i++) {
                    const sp = SURAH_PAGE[i], ep = i < SURAHS.length - 1 ? SURAH_PAGE[i+1] - 1 : 604;
                    if (sp > mEnd) break; if (ep < mStart) continue;
                    list.push({ name: SURAHS[i], start: Math.max(sp, mStart), end: Math.min(ep, mEnd), pages: Math.min(ep, mEnd) - Math.max(sp, mStart) + 1 });
                }
            } else {
                let divider = reviewUnit === "بالأجزاء" ? 20.13 : reviewUnit === "بالأحزاب" ? 10.06 : 2.516;
                const uStart = Math.floor((mStart - 1) / divider) + 1;
                const uEnd = Math.floor((mEnd - 1) / divider) + 1;
                for (let u = uStart; u <= uEnd; u++) {
                    let pStart = Math.max(mStart, Math.round((u - 1) * divider) + 1);
                    let pEnd = Math.min(mEnd, Math.round(u * divider));
                    if (pStart <= pEnd) {
                        list.push({ name: u, start: pStart, end: pEnd, pages: pEnd - pStart + 1 });
                    }
                }
            }

            if (list.length === 0) return Array(activeDays).fill({ label: "—", start: null, end: null });

            let actualTotalPages = list.reduce((sum, item) => sum + item.pages, 0);
            let schedule = [];
            let runningPages = 0;
            let itemIndex = 0;

            for (let day = 1; day <= activeDays; day++) {
                if (itemIndex >= list.length) {
                    schedule.push({ label: "—", start: null, end: null });
                    continue;
                }

                let targetForThisDay = (day * actualTotalPages) / activeDays;
                let currentDayList = [];

                while (itemIndex < list.length) {
                    let item = list[itemIndex];
                    let pagesIfAdded = runningPages + item.pages;

                    if (currentDayList.length === 0) {
                        currentDayList.push(item);
                        runningPages += item.pages;
                        itemIndex++;
                    } else {
                        let diffWithout = Math.abs(runningPages - targetForThisDay);
                        let diffWith = Math.abs(pagesIfAdded - targetForThisDay);
                        
                        let remainingDays = activeDays - day;
                        let remainingItems = list.length - itemIndex;

                        if (remainingItems <= remainingDays) break;

                        if (diffWith <= diffWithout) {
                            currentDayList.push(item);
                            runningPages += item.pages;
                            itemIndex++;
                        } else {
                            break;
                        }
                    }
                }

                let lbl = "";
                if (reviewUnit === "بالسور") {
                    lbl = currentDayList.length === 1 ? currentDayList[0].name : `${currentDayList[0].name} ← ${currentDayList[currentDayList.length-1].name}`;
                } else {
                    let unitName = reviewUnit === "بالأجزاء" ? "ج" : reviewUnit === "بالأحزاب" ? "ح" : "ربع";
                    lbl = currentDayList.length === 1 ? `${unitName} ${currentDayList[0].name}` : `${unitName} ${currentDayList[0].name}–${currentDayList[currentDayList.length-1].name}`;
                }

                schedule.push({ label: lbl, start: currentDayList[0].start, end: currentDayList[currentDayList.length-1].end });
            }
            
            return schedule;
        }

        function getSnappedMutqanEnd(rawEndPage, reviewUnit, isFullyTransferred) {
            if (isFullyTransferred || reviewUnit === "بالصفحات") return Math.floor(rawEndPage);
            let snapped = 0;
            if (reviewUnit === "بالسور") { for (let i=0; i<SURAHS.length; i++) { let ep = (i<SURAHS.length-1)?SURAH_PAGE[i+1]-1:604; if (ep <= rawEndPage+0.05) snapped = ep; } }
            else if (reviewUnit === "بالأجزاء") { for (let i=1; i<=30; i++) { let ep = (i<30)?JUZ_PAGE[i]-1:604; if (ep <= rawEndPage+0.05) snapped = ep; } }
            else if (reviewUnit === "بالأحزاب") { for (let i=1; i<=60; i++) { let ep = Math.min(604, Math.round(i*(604/60))); if (ep <= rawEndPage+0.05) snapped = ep; } }
            else if (reviewUnit === "بالأرباع") { for (let i=1; i<=240; i++) { let ep = Math.min(604, Math.round(i*(604/240))); if (ep <= rawEndPage+0.05) snapped = ep; } }
            return snapped || Math.floor(rawEndPage);
        }

        // ==============================================================
        // الخوارزمية المركزية المعدلة لضمان الترحيل الدقيق
        // ==============================================================
        function generateWeekSchedule() {
            const mP = inputToPages(S.mutqanUnit, S.mutqanFrom, S.mutqanTo, S.mutqanFromQuarter, S.mutqanToQuarter);
            const fP = inputToPages(S.mfUnit, S.mfFrom, S.mfTo, S.mfFromQuarter, S.mfToQuarter);
            
            if (!S.isBeginnerMode && (!mP || !fP)) return [];
            
            const mPsafe = mP || {start:1, end:1};
            const activeDays = (S.mutqanDays || 7) - 1;
            const uj = UNITS_PER_HIZB[S.dailyUnit] ? (UNITS_PER_HIZB[S.dailyUnit] * 2) : 8; // وحدات في الجزء
            
            const startMfIndex = getStartingAbsIndex(S.mfUnit, S.mfFrom, S.dailyUnit, S.mfFromQuarter);
            const endMfIndex = S.isBeginnerMode ? startMfIndex - 1 : getStartingAbsIndex(S.mfUnit, S.mfTo, S.dailyUnit, (parseInt(S.mfToQuarter)||4)+1) - 1;
            const totalBaseMfUnits = Math.max(0, endMfIndex - startMfIndex + 1);

            let newMemIndex = S.hasNew ? getStartingAbsIndex(S.newStartUnit, S.newStartFrom, S.newDailyUnit, S.newStartFromQuarter) : 0;
            let startNewMemIndex = newMemIndex;
            let uPerHizbNew = UNITS_PER_HIZB[S.newDailyUnit] || 1;

            let completedHizbs = [], globalDaysEndOfWeek = PROG.week * activeDays;
            let newMemStatePerDay = {}, newHizbMfList = [];

            // تتبع الأحزاب المنجزة
            for (let g = 1; g <= globalDaysEndOfWeek; g++) {
                completedHizbs.forEach(ch => {
                    if (g === ch.completedOn + activeDays + 1) {
                        const mStart = Math.ceil((ch.completedOn + activeDays) / activeDays) * activeDays + 1;
                        if (!newHizbMfList.some(h => h.hizb === ch.hizb)) newHizbMfList.push({ hizb: ch.hizb, mfStartDay: mStart, mfEndDay: mStart + activeDays - 1, mutqanStartDay: Math.ceil((mStart + activeDays - 1) / activeDays) * activeDays + 1 });
                    }
                });

                let fixStr = completedHizbs.filter(ch => g > ch.completedOn && g <= ch.completedOn + activeDays).map(ch => `<span class="text-amber-700 font-bold">تثبيت الحزب ${ch.hizb} 🔄</span>`).join("<br/>");
                let nMemText = "—", nRevText = "—";

                const transferredMaxHizb = Math.max(0, ...newHizbMfList.filter(h => g >= h.mfStartDay).map(h => h.hizb));
                const cumStartIndex = Math.max(startNewMemIndex, transferredMaxHizb * uPerHizbNew);

                if (S.hasNew) {
                    let dWeek = (g-1) % activeDays, isMemDay = S.newDays.includes(getDayNameByOffset(dWeek));
                    if (dWeek === activeDays - 1) { 
                        const unitsSaved = S.newDays.length;
                        if (unitsSaved > 0) {
                            let startOfThisWeek = Math.max(startNewMemIndex, newMemIndex - unitsSaved);
                            nRevText = `<span class="text-[10.5px] text-teal-700 font-bold">مراجعة الأسبوع ×3</span><br/><span class="text-slate-600">${formatDiscreteRange(startOfThisWeek, newMemIndex - 1, S.newDailyUnit)}</span>`;
                        } else nRevText = "—";
                    } else if (isMemDay) {
                        nMemText = `<div class="font-bold text-amber-900 leading-normal">${formatDiscreteUnit(newMemIndex, S.newDailyUnit)}</div>`;
                        let currentHizb = Math.floor(newMemIndex / uPerHizbNew) + 1;
                        newMemIndex++; 
                        let nextHizb = Math.floor(newMemIndex / uPerHizbNew) + 1;
                        if (nextHizb > currentHizb && !completedHizbs.some(ch => ch.hizb === currentHizb)) completedHizbs.push({hizb: currentHizb, completedOn: g});
                        
                        let cumHTML = "";
                        if (newMemIndex <= startNewMemIndex + 1) cumHTML = `<span class="text-[10.5px] text-teal-700 font-bold">بداية حفظ ✨</span>`;
                        else if (cumStartIndex <= newMemIndex - 2) cumHTML = `<span class="text-[10.5px] text-slate-600 font-bold">${formatDiscreteRange(cumStartIndex, newMemIndex - 2, S.newDailyUnit)}</span>`;
                        nRevText = fixStr ? `${fixStr}${cumHTML ? `<hr class="my-1.5 border-emerald-100"/>${cumHTML}` : ''}` : (cumHTML || "—");
                    } else {
                        let cumHTML = "";
                        if (newMemIndex > startNewMemIndex && cumStartIndex <= newMemIndex - 1) cumHTML = `<span class="text-[10.5px] text-slate-600 font-bold">${formatDiscreteRange(cumStartIndex, newMemIndex - 1, S.newDailyUnit)}</span>`;
                        nRevText = fixStr ? `${fixStr}${cumHTML ? `<hr class="my-1.5 border-emerald-100"/>${cumHTML}` : ''}` : (cumHTML || "—");
                    }
                }
                newMemStatePerDay[g] = { nMemText, nRevText };
            }

            let beginnerMutqanSched = null;
            const beginnerTransferStarted = S.isBeginnerMode && newHizbMfList.length > 0;
            if (beginnerTransferStarted) {
                const consolidatedHizbs = newHizbMfList.filter(h => h.mutqanStartDay <= globalDaysEndOfWeek);
                if (consolidatedHizbs.length > 0) {
                    const maxConsolidatedHizb = Math.max(...consolidatedHizbs.map(h => h.hizb));
                    const beginnerMutqanEndPage = (maxConsolidatedHizb < 60) ? HIZB_START_PAGES[maxConsolidatedHizb] - 1 : 604;
                    const beginnerMutqanStartPage = inputToStartPage(S.newStartUnit, S.newStartFrom) || 1;
                    const totalMutqanPages = Math.max(0, beginnerMutqanEndPage - beginnerMutqanStartPage + 1);
                    const avgDailyMutqanPages = totalMutqanPages / activeDays;
                    const beginnerMutqanReviewUnit = avgDailyMutqanPages >= 20 ? "بالأجزاء" : avgDailyMutqanPages > 10 ? "بالأحزاب" : "بالصفحات";
                    beginnerMutqanSched = distributeMutqan(beginnerMutqanStartPage, beginnerMutqanEndPage, activeDays, beginnerMutqanReviewUnit);
                }
            }

            const transferDelay = Math.min(uj, totalBaseMfUnits > 0 ? totalBaseMfUnits : uj);
            const tEnd = Math.max(0, globalDaysEndOfWeek - transferDelay);
            
            const actualTEnd = Math.min(tEnd, totalBaseMfUnits);
            const pagesFromMutafalit = actualTEnd * (604 / (30 * uj)); 
            let rawEndThisWeek = mPsafe.end + pagesFromMutafalit;

            const transferredHizbsNow = newHizbMfList.filter(h => h.mutqanStartDay <= globalDaysEndOfWeek);
            if (transferredHizbsNow.length > 0) {
                let maxHizb = Math.max(...transferredHizbsNow.map(h => h.hizb));
                let maxHizbEndPage = (maxHizb < 60) ? HIZB_START_PAGES[maxHizb] - 1 : 604;
                if (maxHizbEndPage > rawEndThisWeek) {
                    rawEndThisWeek = maxHizbEndPage;
                }
            }

            let snappedEndThisWeek = Math.max(getSnappedMutqanEnd(Math.min(604, rawEndThisWeek), S.mutqanReviewUnit, tEnd >= totalBaseMfUnits && totalBaseMfUnits > 0), mPsafe.end);
            const baseMutqanSched = (S.isBeginnerMode && !S.mutqanFrom) ? [] : distributeMutqan(mPsafe.start, snappedEndThisWeek, activeDays, S.mutqanReviewUnit);

            const rows = [];
            for (let i = 0; i < activeDays; i++) {
                const dayIndex = i + 1, globalDay = (PROG.week - 1) * activeDays + dayIndex, mfUnitIndex = globalDay - 1;
                let mutqanText = beginnerMutqanSched
                    ? (beginnerMutqanSched[i] ? beginnerMutqanSched[i].label : "—")
                    : (baseMutqanSched[i] ? baseMutqanSched[i].label : "—");
                
                let mfText = "—", mfFinishedNote = null;
                if (mfUnitIndex < totalBaseMfUnits) mfText = formatDiscreteUnit(startMfIndex + mfUnitIndex, S.dailyUnit);
                else if (totalBaseMfUnits > 0 && mfUnitIndex === totalBaseMfUnits) mfFinishedNote = "🎉 اكتمل المتفلت الأساسي!";

                if (S.hasNew) {
                    const activeNewHizb = newHizbMfList.find(h => (globalDay - h.mfStartDay) >= 0 && (globalDay - h.mfStartDay) < activeDays);
                    if (activeNewHizb) {
                        const addedText = `<span class="text-amber-700 font-bold">الحزب ${activeNewHizb.hizb}</span>`;
                        mfText = (mfText !== "—") ? `${mfText} <br><span class="font-bold text-amber-600">+</span> ${addedText}` : `${addedText}`;
                    }
                }

                if (!S.isBeginnerMode && globalDay === transferDelay && globalDay > 1 && !PROG.messageShown) { setTimeout(() => { document.getElementById('celebration-modal').style.display='flex'; PROG.messageShown = true; saveState(); }, 500); }
                if (mfUnitIndex === totalBaseMfUnits && totalBaseMfUnits > 0 && globalDay > 1 && !PROG.finishedShown) { setTimeout(() => { document.getElementById('finished-modal').style.display='flex'; PROG.finishedShown = true; saveState(); }, 500); }
                let ns = newMemStatePerDay[globalDay] || { nMemText: "—", nRevText: "—" };

                rows.push({
                    day: dayIndex, dayName: getDayNameByOffset(i), dateStr: getFormattedDateOffset(i),
                    mutqan: mutqanText, mutfalet: mfText, mfFinishedNote: mfFinishedNote,
                    newMem: ns.nMemText, newReview: ns.nRevText, isBuffer: false, isMutafalitEmpty: (mfText === "—") 
                });
            }
            rows.push({ day: S.mutqanDays, dayName: getDayNameByOffset(S.mutqanDays - 1), dateStr: getFormattedDateOffset(S.mutqanDays - 1), isBuffer: true });
            rows.beginnerTransferStarted = beginnerTransferStarted;
            return rows;
        }

        function getDayNameByOffset(offset) {
            const base = PROGRAM_START_DATE || new Date();
            const target = new Date(base.getTime());
            target.setDate(base.getDate() + (PROG.week - 1) * S.mutqanDays + offset);
            return ALL_DAYS[target.getDay()];
        }

        function getFormattedDateOffset(offset) {
            const base = PROGRAM_START_DATE || new Date(), target = new Date(base.getTime());
            target.setDate(base.getDate() + (PROG.week - 1) * S.mutqanDays + offset);
            return `${target.getDate()} ${["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"][target.getMonth()]}`;
        }

        function completeToday() {
            const base = PROGRAM_START_DATE || new Date(), rows = generateWeekSchedule();
            rows.forEach(r => {
                if (r.isBuffer) return;
                const rowDate = new Date(base.getTime()); rowDate.setDate(base.getDate() + (PROG.week - 1) * S.mutqanDays + (r.day - 1));
                if (rowDate.toDateString() === new Date().toDateString()) {
                    ['mutqan', 'mutfalet'].forEach(col => TRACKING[getTrackKey(PROG.week, r.day, col)] = 'done');
                    if (S.hasNew) { if (r.newMem !== "—") TRACKING[getTrackKey(PROG.week, r.day, 'newMem')] = 'done'; if (r.newReview !== "—") TRACKING[getTrackKey(PROG.week, r.day, 'newReview')] = 'done'; }
                }
            });
            saveState(); render();
        }

        function getTrackKey(week, day, col) { return `w${week}_d${day}_${col}`; }

        function toggleTrack(day, col) {
            const key = getTrackKey(PROG.week, day, col);
            if (!TRACKING[key]) TRACKING[key] = 'done'; else if (TRACKING[key] === 'done') TRACKING[key] = 'skip'; else delete TRACKING[key];
            saveState(); render();
        }

        function getTrackEmoji(day, col) {
            const val = TRACKING[getTrackKey(PROG.week, day, col)]; return val === 'done' ? '✅' : val === 'skip' ? '❌' : '⬜';
        }

        function nextWeek() { PROG.week++; saveState(); render(); }
        function prevWeek() { if (PROG.week > 1) { PROG.week--; saveState(); render(); } }

        function calculateWeeklyProgress() {
            const activeDays = S.mutqanDays - 1; let total = 0, done = 0;
            const weekRows = generateWeekSchedule();
            for (let d = 1; d <= activeDays; d++) {
                const row = weekRows.find(r => r.day === d);
                if(!S.isBeginnerMode){
                    if (row && row.mutqan !== "—") { total++; if (TRACKING[getTrackKey(PROG.week, d, 'mutqan')] === 'done') done++; }
                    if (row && row.mutfalet !== "—") { total++; if (TRACKING[getTrackKey(PROG.week, d, 'mutfalet')] === 'done') done++; }
                }
                if (S.hasNew) {
                    const isMemDay = S.newDays.includes(getDayNameByOffset(d - 1));
                    if (isMemDay && d !== activeDays) { total++; if (TRACKING[getTrackKey(PROG.week, d, 'newMem')] === 'done') done++; }
                    if (row && row.newReview && row.newReview !== "—") { total++; if (TRACKING[getTrackKey(PROG.week, d, 'newReview')] === 'done') done++; }
                }
            }
            return total === 0 ? 0 : Math.round((done / total) * 100);
        }

        function getWeekDoneTotal(week) {
            const savedWeek = PROG.week; PROG.week = week;
            const activeDays = S.mutqanDays - 1; let total = 0, done = 0;
            for (let d = 1; d <= activeDays; d++) {
                if (!S.isBeginnerMode) {
                    total += 2;
                    if (TRACKING[getTrackKey(week, d, 'mutqan')] === 'done') done++;
                    if (TRACKING[getTrackKey(week, d, 'mutfalet')] === 'done') done++;
                }
                if (S.hasNew) {
                    const isMemDay = S.newDays.includes(getDayNameByOffset(d - 1));
                    if (isMemDay && d !== activeDays) { total++; if (TRACKING[getTrackKey(week, d, 'newMem')] === 'done') done++; }
                    const row = generateWeekSchedule().find(r => r.day === d);
                    if (row && row.newReview && row.newReview !== "—") { total++; if (TRACKING[getTrackKey(week, d, 'newReview')] === 'done') done++; }
                }
            }
            PROG.week = savedWeek;
            return { done, total };
        }

        // دوال حساب شهر الإنجاز التراكمي ومحطة المحاسبة المستقلة
        function getProgramMonthSummary() {
            // 1. حساب العداد الدائري التراكمي: يزيد كل 4 أسابيع وعند الوصول للسنة (12 شهراً) يعود للصفر
            const displayMonth = ((Math.ceil(PROG.week / 4) - 1) % 12) + 1;

            // 2. تحديد نطاق أسابيع الشهر الحالي فقط لـ "محطة المحاسبة" لضمان تصفيرها كل 4 أسابيع
            const currentMonthBlock = Math.ceil(PROG.week / 4);
            const startWeek = (currentMonthBlock - 1) * 4 + 1;
            const endWeek = startWeek + 3; 

            let totalNewUnits = 0, doneSum = 0, totalSum = 0;
            
            // حساب النسبة داخل أسابيع هذا الشهر الحالي فقط
            for (let w = startWeek; w <= endWeek; w++) {
                const savedWeek = PROG.week; PROG.week = w;
                const rows = generateWeekSchedule();
                rows.forEach(r => { if (!r.isBuffer && r.newMem && r.newMem !== "—") totalNewUnits++; });
                PROG.week = savedWeek;
                const { done, total } = getWeekDoneTotal(w);
                doneSum += done; totalSum += total;
            }
            
            const pct = totalSum === 0 ? 0 : Math.round((doneSum / totalSum) * 100);
            return { monthNum: displayMonth, pct, totalNewUnits, startWeek, currentMonthBlock };
        }

        function getMotivationalMessage(pct, isEndOfMonth) {
            if (isEndOfMonth) {
                if (pct >= 90) return `🎉 مبارك إتمام شهر الإنجاز بتفوق مبهر (${pct}%)! واصلي فهذا غراس يثمر نوراً في الدارين. 🌟`;
                if (pct >= 70) return `👏 شهر إنجاز رائع ومبشر بتثبيت متين (${pct}%)! خطوة بخطوة يقترب التمام، زادك الله همة. 💪`;
                if (pct >= 50) return `👍 اجتزتِ شهراً كاملاً بنسبة (${pct}%). الإنجاز طيب، والشهر القادم سيكون أقوى وأسعد بإذن الله! 🌱`;
                return `🤍 انتهى شهر من المسير بنسبة (${pct}%). لا بأس، كل بداية شهر هي فرصة متجددة لشحذ الهمة؛ استعيني بالله وابدئي بقوة!`;
            } else {
                if (pct >= 90) return `ما شاء الله، إنجاز متميز جداً في أسابيع هذا الشهر حتى الآن (${pct}%)! 🌟 اللهم بارك وثبّت.`;
                if (pct >= 70) return `أحسنتِ، تقدّم طيب جداً خلال هذا الشهر (${pct}%) 💪 واصلي بروح عالية وثبات.`;
                if (pct >= 50) return `مسير موفق بحمد الله (${pct}%) 🌱 حاولي رفع نسبة الإنجاز في الأسابيع المتبقية لتتوجي بامتياز.`;
                return `🤍 خطوة صغيرة كل يوم تصنع فارقاً كبيراً. نسبة الشهر حتى الآن (${pct}%)، استعيني بالله لتُعلي الهمة في القادم.`;
            }
        }

        function openMonthCheckpoint() { S.showMonthCheckpoint = true; saveState(); render(); }
        function closeMonthCheckpoint() { S.showMonthCheckpoint = false; saveState(); render(); }
        function showHelpModal() {
        const overlay = document.createElement("div");
        overlay.className = "fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4";
        overlay.innerHTML = `
            <div class="bg-white rounded-3xl p-6 max-w-md w-full shadow-xl animate-pop text-right" style="max-height:85vh; overflow-y:auto;">
                <div class="text-center mb-4">
                    <div class="text-4xl mb-2">🚀</div>
                    <h3 class="text-lg font-extrabold text-slate-800">كيف أبدأ؟</h3>

                        <p class="text-xs text-slate-600 leading-relaxed mb-1">زر <span class="font-bold">✓ إنهاء</span> يظهر بجانب تاريخ اليوم الحالي، ويضع علامة "تم" على كل عناصر اليوم بضغطة واحدة.</p>
                        <p class="text-xs text-slate-600 leading-relaxed"><span class="font-bold">📊 محطة المحاسبة</span> الشهرية: ملخّص لما حفظتِه هذا الشهر ونسبة إنجازك، مع رسالة/دعاء تلقائي يتغيّر حسب نسبتك.</p>

                        <h4 class="font-bold text-emerald-800 text-sm mt-3 mb-1">🛠️ أمور أخرى يتيحها البرنامج</h4>
                        <p class="text-xs text-slate-600 leading-relaxed mb-1"><span class="font-bold">💾 حفظ واستيراد البرنامج</span>: يمكنكِ في أي وقت تحميل نسخة من برنامجك كملف (نسخة احتياطية)، واستيرادها لاحقاً متى شئتِ لاستعادة برنامجك بكل تفاصيله وتقدّمه كما كان.</p>
                        <p class="text-xs text-slate-600 leading-relaxed mb-1"><span class="font-bold">✎ تعديل خيارات البرنامج</span>: تعديل أي إعداد (أيام الحفظ، نطاق المراجعة...) في أي وقت دون الحاجة لإعادة البدء من جديد.</p>
                        <p class="text-xs text-slate-600 leading-relaxed mb-1"><span class="font-bold">🌟 يوم الاستدراك والراحة</span>: يوم في نهاية كل دورة لتعويض ما فاتكِ أو الراحة.</p>
                        <p class="text-xs text-slate-600 leading-relaxed mb-3"><span class="font-bold">🚪 الخروج وإنشاء برنامج جديد</span>: لبدء برنامج جديد بإعدادات مختلفة.</p>

                        <button onclick="closeRulesModal()" class="w-full py-3 green-gradient text-white font-bold rounded-xl">إغلاق</button>
                    </div>`;
                container.appendChild(overlay2);
            }        }

        function renderFastEditMenu(container) {
            container.innerHTML = ""; 
            const card = document.createElement("div"); card.className = "bg-white border border-slate-200 rounded-3xl p-6 shadow-sm mt-4 text-right animate-pop";
            card.innerHTML = `<h2 class="text-lg font-bold text-slate-800 mb-2">✎ تعديل سريع</h2><p class="text-xs text-slate-400 mb-6">عدلي أي خيار وسيتم تحديث الجدول فوراً بناءً على تعديلك.</p>`;
            
            const lbl = u => u==='suwar'?'بالسور':u==='ajzaa'?'بالأجزاء':u==='ahzab'?'بالأحزاب':u==='pages'?'بالصفحات':'';
            let editItems = [];
            
            if (!S.isBeginnerMode) {
                editItems.push(
                    { label: "المتقن الدائري", step: 3, val: `${lbl(S.mutqanUnit)} (${S.mutqanFrom} - ${S.mutqanTo})` },
                    { label: "وحدة مراجعة المتقن", step: 4, val: S.mutqanReviewUnit },
                    { label: "دورة المتقن", step: 5, val: `${S.mutqanDays} أيام` },
                    { label: "المتفلت التراكمي", step: 6, val: `${lbl(S.mfUnit)} (${S.mfFrom} - ${S.mfTo})` },
                    { label: "وحدة ترميم المتفلت", step: 7, val: S.dailyUnit },
                    { label: "إدراج مسار حفظ جديد", step: 8, val: S.hasNew ? "مفعل" : "معطل" }
                );
            }
            if (S.hasNew) {
                editItems.push(
                    { label: "مقدار الحفظ الجديد اليومي", step: 9, val: S.newDailyUnit },
                    { label: "أيام الحفظ في الأسبوع", step: 10, val: S.newDays.length > 0 ? S.newDays.join("، ") : "لم تحدد" },
                    { label: "موضع البدء في الحفظ", step: 11, val: S.newStartFrom ? formatDiscreteUnit(getStartingAbsIndex(S.newStartUnit, S.newStartFrom, S.newDailyUnit, S.newStartFromQuarter), S.newDailyUnit) || S.newStartFrom : "—" }
                );
            }
            editItems.push({ label: "تاريخ ويوم الانطلاق", step: 12, val: S.weekStartDay });

            editItems.forEach(i => {
                const b = document.createElement("button"); b.className = "w-full p-4 rounded-xl border border-slate-200 mb-3 hover:border-emerald-600 hover:bg-slate-50 transition flex justify-between items-center";
                b.innerHTML = `<div class="flex flex-col text-right w-full"><span class="font-bold text-sm text-slate-800">${i.label}</span><span class="text-xs font-semibold text-emerald-600 mt-1">${i.val}</span></div><span class="text-slate-400 mr-4 text-lg">✎</span>`;
                b.onclick = () => { S.isEditing = true; S.step = i.step; render(); }; card.appendChild(b);
            });
            const backBtn = document.createElement("button"); backBtn.className = "w-full py-4 green-gradient text-white font-bold rounded-xl shadow mt-4";
            backBtn.textContent = "تأكيد والعودة للجدول ✓"; backBtn.onclick = () => { S.isEditing = false; S.step = 99; saveState(); render(); }; card.appendChild(backBtn);
            container.appendChild(card);
        }
       
        window.onload = function() {
    // 1. زيادة عداد مرات الفتح
    incrementCounterDirect('app-opens');
    loadSavedState();
    render();
    
    // 2. عرض الإحصائيات إذا كان الرابط يحتوي على ?stats=1
    if (new URLSearchParams(window.location.search).get('stats') === '1') {
        const box = document.createElement('div');
        box.style.cssText = 'position:fixed;top:14px;left:14px;z-index:9999;direction:rtl;min-width:190px;';
        box.className = 'bg-white border border-slate-200 rounded-2xl shadow-lg p-4 text-right';
        
        // عرض رسالة تحميل مبدئية
        box.innerHTML = `
            <div class="text-[11px] font-extrabold text-slate-400 mb-2 pb-2 border-b border-slate-100">📊 إحصائيات الاستخدام</div>
            <div class="text-xs text-slate-500 font-bold animate-pulse">جاري جلب البيانات...</div>
        `;
        document.body.appendChild(box);

        // جلب الأرقام وعرضها تلقائياً
        Promise.all([
            fetchCounterValueDirect('app-opens'),
            fetchCounterValueDirect('programs-created')
        ]).then(([opens, programs]) => {
            box.innerHTML = `
                <div class="text-[11px] font-extrabold text-slate-400 mb-2 pb-2 border-b border-slate-100">📊 إحصائيات الاستخدام</div>
                <div class="block text-xs text-emerald-700 font-bold mb-2">مرات الفتح: <span class="text-slate-800">${opens}</span></div>
                <div class="block text-xs text-emerald-700 font-bold">برامج أُنشئت: <span class="text-slate-800">${programs}</span></div>
            `;
        });
    }
};
      // window.onload = function() { loadSavedState(); render(); };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker مسجّل بنجاح:', reg.scope))
                    .catch(err => console.log('فشل تسجيل Service Worker:', err));
            });
        }
    
</script>
