<!-- Firebase Leaderboard -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey: "AIzaSyC828iIVZOZQRGqkt69cg85tB8VQLxR0p8",
    authDomain: "mihrab-leaderboard.firebaseapp.com",
    databaseURL: "https://mihrab-leaderboard-default-rtdb.firebaseio.com",
    projectId: "mihrab-leaderboard",
    storageBucket: "mihrab-leaderboard.firebasestorage.app",
    messagingSenderId: "791618163486",
    appId: "1:791618163486:web:4afe02716d3fd5b99d6f0f"
});
const _fbDb = firebase.database();

function pushToLeaderboard() {
    try {
        const raw = localStorage.getItem('qp_current_program_v6');
        if (!raw) return;
        const { S, PROG, TRACKING } = JSON.parse(raw);
        if (!PROG || !PROG.name) return;

        const tk = (w, d, c) => `w${w}_d${d}_${c}`;
        const activeDays = S.mutqanDays - 1;

        // متقن
        let t=0, d=0;
        for(let i=1;i<=activeDays;i++){
            if(TRACKING[tk(PROG.week,i,'mutqan')]!==undefined){
                t++; if(TRACKING[tk(PROG.week,i,'mutqan')]==='done')d++;
            }
        }
        const mutqanPct = t===0 ? 0 : Math.round((d/t)*100);

        // متفلت
        t=0; d=0;
        for(let i=1;i<=activeDays;i++){
            const kw=tk(PROG.week,i,'mutfaletWard'), kc=tk(PROG.week,i,'mutfaletCumul');
            const hw=TRACKING[kw]!==undefined, hc=TRACKING[kc]!==undefined;
            if(hw&&hc){t+=2;if(TRACKING[kw]==='done')d++;if(TRACKING[kc]==='done')d++;}
            else if(hw){t++;if(TRACKING[kw]==='done')d++;}
            else if(hc){t++;if(TRACKING[kc]==='done')d++;}
        }
        const mutfaletPct = t===0 ? 0 : Math.round((d/t)*100);

        // جديد
        let newPct = null;
        if(S.hasNew){ t=0; d=0;
            for(let i=1;i<=activeDays;i++){
                if(TRACKING[tk(PROG.week,i,'newMem')]!==undefined){t++;if(TRACKING[tk(PROG.week,i,'newMem')]==='done')d++;}
                if(TRACKING[tk(PROG.week,i,'newReview')]!==undefined){t++;if(TRACKING[tk(PROG.week,i,'newReview')]==='done')d++;}
            }
            newPct = t===0 ? 0 : Math.round((d/t)*100);
        }

        // weekPct — متوسط مرجّح (الجديد بثقل مضاعف)
        const parts = [mutqanPct, mutfaletPct, ...(newPct!==null?[newPct,newPct]:[])].filter(v=>v!==null);
        const weekPct = parts.length===0 ? 0 : Math.round(parts.reduce((a,b)=>a+b,0)/parts.length);

        const key = PROG.name.replace(/[.#$[\]]/g, '_');
        _fbDb.ref('leaderboard/' + key).set({
            name: PROG.name,
            week: PROG.week,
            weekPct,
            mutqanPct,
            mutfaletPct,
            newPct,
            lastUpdate: Date.now()
        });
    } catch(e) { console.warn('pushToLeaderboard error', e); }
}
</script>
</body>
</html>
